{% extends "base.html" %}

{% block title %}Gráfico - {{ titulo }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h1 class="mb-4">{{ titulo }}</h1>
            <div id="grafico"></div>
        </div>
    </div>
</div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
    var graphJSON = '{{ graphJSON | safe }}';
    var graphs = JSON.parse(graphJSON);
    Plotly.newPlot('grafico', graphs.data, graphs.layout);
</script>
{% endblock %}
