<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/forgot-pasword.css') }}">
</head>
<body>

    <div class="logo">
        <img src="{{ url_for('static', filename='img/ícone_102x102b.png') }}" />
    </div>

    <div class="recuperacao-container">
        <h1>Redefinir Senha</h1>
        <p>Crie uma nova senha segura para sua conta.</p>

        <!-- FLASH MESSAGES -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <label for="password">Nova senha</label>

            <div class="password-wrapper">
                <input type="password" id="password" name="password" required>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>

            <div class="password-strength">
                <div id="strength-bar"></div>
            </div>
            <small id="strength-text"></small>

            <button type="submit">Redefinir senha</button>
        </form>

        <div class="links">
            <a href="{{ url_for('auth.login') }}">Voltar para o login</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/password-strength.js') }}"></script>
</body>
</html>
