<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    
    <!-- Botão de Tema -->
    <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
        <span class="material-symbols-outlined icon-light">light_mode</span>
        <span class="material-symbols-outlined icon-dark">dark_mode</span>
    </button>

    <main>
        <section class="auth-container">
            <header class="auth-header">
                <div class="logo">
                    <span class="material-symbols-outlined">person_add</span>
                </div>
                <h2>Cadastro de Usuário</h2>
                <p class="subtitle">Junte-se à Missão</p>
            </header>
            
            <!-- Flash Messages do Flask -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            
            <!-- 👇 action="" envia para a mesma rota (POST /register) -->
            <form method="POST" action="">
                <div class="campo">
                    <label for="username">Usuário:</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined">person</span>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            required 
                            autocomplete="username"
                            placeholder="Seu nome de usuário"
                        >
                    </div>
                </div>
                
                <div class="campo">
                    <label for="email">E-mail:</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined">mail</span>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            autocomplete="email"
                            placeholder="seu@email.com"
                        >
                    </div>
                </div>
                
                <div class="campo">
                    <label for="password">Senha:</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined">lock</span>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            minlength="8"
                            autocomplete="new-password"
                            placeholder="Mínimo 8 caracteres"
                        >
                    </div>
                </div>
                
                <button type="submit">
                    <span class="material-symbols-outlined">how_to_reg</span>
                    Cadastrar
                </button>
            </form>
            
            <p class="auth-link">
                <!-- 👇 Link Flask -->
                Já tem conta? <a href="{{ url_for('auth.login') }}">Faça login</a>
            </p>
        </section>
    </main>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme');
        
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
        }
        
        themeToggle.addEventListener('click', function() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>
        <p class="auth-link">
        <!-- 👇 Sem /auth -->
        Já tem conta? <a href="/login">Faça login</a>
        </p>
</body>
</html>
