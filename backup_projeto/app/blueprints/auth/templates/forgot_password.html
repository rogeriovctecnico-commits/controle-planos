<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Recuperação Senha</title>
    </head>
    <body>
    
        <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/forgot-pasword.css') }}"
        />

        <div class="logo">
                <img src="{{ url_for('static', filename='img/ícone_102x102b.png') }}" />
        </div>

        <div class="recuperacao-container">
            <h1>RVC Assessoria em Planos de Saúde</h1>
                <p>Informe seu e-mail para receber o link de redefinição.</p>

                <form method="post">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required />

                    <button type="submit">Enviar link de recuperação</button>
                </form>

        <div class="links">
            <a href="{{ url_for('auth.login') }}">Voltar para o login</a>
        </div>
        </div>
        

    </body>
</html>
