{% macro render_field(field, extra_classes='') %}
<div class="mb-3">
  {{ field.label(class="form-label") }}
  {{ field(class="form-control " + extra_classes, **kwargs) }}
  {% if field.errors %}
    <div class="invalid-feedback d-block">
      {% for error in field.errors %}
        <span>{{ error }}</span>
      {% endfor %}
    </div>
  {% endif %}
</div>
{% endmacro %}
